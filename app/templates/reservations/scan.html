{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card border-0 shadow-lg rounded-4 text-center">
            <div class="card-body p-5">
                <div class="mb-4">
                    <div class="rounded-circle bg-primary bg-opacity-10 d-inline-flex align-items-center justify-content-center"
                        style="width: 80px; height: 80px;">
                        <i class="bi bi-qr-code-scan fs-1 text-primary"></i>
                    </div>
                </div>

                <h3 class="fw-bold mb-3">Validador de Acesso</h3>
                <p class="text-muted mb-4">Escaneie o QR Code do morador ou digite o código manualmente.</p>

                <!-- Manual Input -->
                <form action="{{ url_for('reservations.verify') }}" method="get">
                    <div class="input-group mb-3">
                        <input type="text" name="token" class="form-control form-control-lg text-center fw-bold"
                            placeholder="Digite o Token..." required autocomplete="off">
                    </div>
                    <button type="submit" class="btn btn-primary w-100 rounded-pill py-3 fw-bold">Verificar
                        Acesso</button>
                </form>

                <hr class="my-4">

                <button class="btn btn-outline-secondary w-100 rounded-pill"
                    onclick="alert('Funcionalidade de câmera viria aqui (integração JS)');">
                    <i class="bi bi-camera me-2"></i> Abrir Câmera
                </button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% extends "base.html" %}

{% block content %}
<h2>Lançar Nova Cobrança</h2>
<form method="post" class="mt-4">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
    <div class="mb-3">
        <label for="unit_id" class="form-label">Unidade (Bloco/Apartamento)</label>
        <select class="form-select" id="unit_id" name="unit_id" required>
            <option value="">Selecione...</option>
            {% for unit in units %}
            <option value="{{ unit.id }}">Bloco {{ unit.block }} - {{ unit.number }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="mb-3">
        <label for="description" class="form-label">Descrição</label>
        <input type="text" class="form-control" id="description" name="description" required>
    </div>
    <div class="mb-3">
        <label for="amount" class="form-label">Valor (R$)</label>
        <input type="number" step="0.01" class="form-control" id="amount" name="amount" required>
    </div>
    <div class="mb-3">
        <label for="due_date" class="form-label">Data de Vencimento</label>
        <input type="date" class="form-control" id="due_date" name="due_date" required>
    </div>
    <button type="submit" class="btn btn-primary">Lançar</button>
    <a href="{{ url_for('payments.index') }}" class="btn btn-secondary">Cancelar</a>
</form>
{% endblock %}

{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-header bg-white border-0 pt-4 px-4">
                <h4 class="fw-bold mb-0">Registrar Encomenda</h4>
            </div>
            <div class="card-body p-4">
                <form method="post" enctype="multipart/form-data">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
                    <div class="mb-3">
                        <label for="resident_search" class="form-label small fw-bold text-muted"><i
                                class="bi bi-search me-1"></i> Buscar por Nome (Auto-preencher)</label>
                        <input class="form-control" list="residentsParams" id="resident_search"
                            placeholder="Digite o nome do morador...">
                        <datalist id="residentsParams">
                            {% for resident in residents %}
                            <!-- Value is Name, we store Unit ID in data attribute via JS logic or composite value -->
                            {% if resident.unit %}
                            <option value="{{ resident.username }}" data-unit-id="{{ resident.unit_id }}">BL {{
                                resident.unit.block }} - AP {{ resident.unit.number }}</option>
                            {% endif %}
                            {% endfor %}
                        </datalist>
                    </div>

                    <div class="mb-3">
                        <label for="unit_id" class="form-label small fw-bold text-muted">Unidade Destino</label>
                        <select class="form-select form-select-lg bg-light border-0" id="unit_id" name="unit_id"
                            required>
                            <option value="" disabled selected>Selecione...</option>
                            {% for unit in units %}
                            <option value="{{ unit.id }}">Unidade {{ unit.number }} - Bloco {{ unit.block }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <script>
                        document.getElementById('resident_search').addEventListener('input', function (e) {
                            var input = e.target;
                            var list = input.getAttribute('list');
                            var options = document.getElementById(list).childNodes;
                            for (var i = 0; i < options.length; i++) {
                                if (options[i].value === input.value) {
                                    // Found the resident
                                    var unitId = options[i].getAttribute('data-unit-id');
                                    if (unitId) {
                                        document.getElementById('unit_id').value = unitId;
                                        // Auto fill label
                                        document.getElementById('recipient_label').value = input.value;
                                    }
                                    break;
                                }
                            }
                        });
                    </script>

                    <div class="mb-3">
                        <label for="description" class="form-label small fw-bold text-muted">Descrição</label>
                        <input type="text" class="form-control form-control-lg bg-light border-0" id="description"
                            name="description" placeholder="Ex: Caixa Pequena, Envelope..." required>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="recipient_label" class="form-label small fw-bold text-muted">Destinatário
                                (Rótulo)</label>
                            <input type="text" class="form-control bg-light border-0" id="recipient_label"
                                name="recipient_label" placeholder="Nome na caixa">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="storage_location" class="form-label small fw-bold text-muted">Local
                                Armazenamento</label>
                            <input type="text" class="form-control bg-light border-0" id="storage_location"
                                name="storage_location" placeholder="Ex: Prateleira A1">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="image" class="form-label small fw-bold text-muted">Foto (Opcional)</label>
                        <div class="d-flex gap-2">
                            <input type="file" class="form-control bg-light border-0" id="image" name="image"
                                accept="image/*" capture="environment">
                            <button type="button" class="btn btn-outline-secondary"
                                onclick="document.getElementById('image').click()">
                                <i class="bi bi-camera"></i>
                            </button>
                        </div>
                        <div class="form-text">Use a câmera do celular para fotografar o pacote.</div>
                    </div>

                    <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-5">
                        <a href="{{ url_for('deliveries.index') }}"
                            class="btn btn-light rounded-pill fw-bold text-muted px-4">Cancelar</a>
                        <button type="submit" class="btn btn-primary rounded-pill fw-bold px-5">Registrar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

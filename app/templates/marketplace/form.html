{% extends "base.html" %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card border-0 shadow-sm rounded-4">
                <div class="card-header bg-white border-bottom-0 pt-4 pb-0 text-center">
                    <div class="bg-primary bg-opacity-10 text-primary rounded-circle d-inline-flex p-3 mb-3">
                        <i class="bi bi-tag fs-3"></i>
                    </div>
                    <h4 class="fw-bold text-dark">Novo Anúncio</h4>
                    <p class="text-muted small">Desapegue do que não usa mais!</p>
                </div>
                <div class="card-body p-4">
                    <form method="POST" enctype="multipart/form-data">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                        <div class="mb-3">
                            <label class="form-label fw-semibold">O que você está vendendo?</label>
                            <input type="text" class="form-control form-control-lg bg-light border-0" name="title"
                                placeholder="Ex: Bicicleta Aro 29" required autofocus>
                        </div>

                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Preço (R$)</label>
                                <div class="input-group">
                                    <span class="input-group-text border-0 bg-light">R$</span>
                                    <input type="number" step="0.01" class="form-control bg-light border-0" name="price"
                                        placeholder="0,00">
                                </div>
                                <div class="form-text small">Deixe em branco ou 0 para Doação</div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Contato (WhatsApp)</label>
                                <div class="input-group">
                                    <span class="input-group-text border-0 bg-light"><i
                                            class="bi bi-whatsapp"></i></span>
                                    <input type="text" class="form-control bg-light border-0" name="contact"
                                        placeholder="(11) 99999-9999" required>
                                </div>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold">Descrição Detalhada</label>
                            <textarea class="form-control bg-light border-0" name="description" rows="4"
                                placeholder="Detalhes sobre o estado do produto, tempo de uso, etc."></textarea>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold">Foto do Produto</label>
                            <div class="upload-zone p-4 border-2 border-dashed rounded-3 text-center bg-light"
                                onclick="document.getElementById('imageInput').click()">
                                <i class="bi bi-cloud-arrow-up fs-3 text-muted mb-2"></i>
                                <p class="text-muted small mb-0">Clique para selecionar uma foto</p>
                                <input type="file" name="image" id="imageInput" class="d-none" accept="image/*"
                                    onchange="previewImage(this)">
                            </div>
                            <div id="imagePreview" class="mt-3 text-center d-none">
                                <img src="" class="img-fluid rounded shadow-sm" style="max-height: 200px;">
                                <button type="button" class="btn btn-sm btn-outline-danger mt-2"
                                    onclick="clearImage()">Remover</button>
                            </div>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary btn-lg rounded-pill fw-bold">Publicar
                                Anúncio</button>
                            <a href="{{ url_for('marketplace.index') }}"
                                class="btn btn-light btn-lg rounded-pill text-muted">Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .upload-zone {
        border-style: dashed;
        border-color: #dee2e6;
        cursor: pointer;
        transition: all 0.2s;
    }

    .upload-zone:hover {
        border-color: var(--bs-primary);
        background-color: #e9ecef !important;
    }
</style>

<script>
    function previewImage(input) {
        if (input.files && input.files[0]) {
            var reader = new FileReader();
            reader.onload = function (e) {
                document.querySelector('#imagePreview img').src = e.target.result;
                document.getElementById('imagePreview').classList.remove('d-none');
                document.querySelector('.upload-zone').classList.add('d-none');
            }
            reader.readAsDataURL(input.files[0]);
        }
    }

    function clearImage() {
        document.getElementById('imageInput').value = '';
        document.getElementById('imagePreview').classList.add('d-none');
        document.querySelector('.upload-zone').classList.remove('d-none');
    }
</script>
{% endblock %}

{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card border-0 shadow-lg rounded-4">
            <div class="card-body p-5">
                <h3 class="fw-bold mb-4">Novo Comunicado</h3>

                <form method="post" enctype="multipart/form-data">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />

                    <div class="mb-3">
                        <label class="form-label fw-bold">Título</label>
                        <input type="text" name="title" class="form-control form-control-lg bg-light border-0" required
                            autofocus>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Texto</label>
                        <textarea name="content" class="form-control bg-light border-0" rows="5" required></textarea>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">Imagem (Opcional)</label>
                        <input type="file" name="image" class="form-control" accept="image/*">
                        <div class="form-text">Anexe fotos de avisos, obras ou eventos.</div>
                    </div>

                    <div class="form-check form-switch mb-4">
                        <input class="form-check-input" type="checkbox" role="switch" id="isImportant"
                            name="is_important">
                        <label class="form-check-label fw-bold text-danger" for="isImportant">
                            Marcar como IMPORTANTE
                        </label>
                        <div class="form-text">Fixa no topo e destaca em vermelho.</div>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg rounded-pill fw-bold">Publicar no
                            Mural</button>
                        <a href="{{ url_for('notices.index') }}" class="btn btn-light btn-lg rounded-pill">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

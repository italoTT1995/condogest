{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 col-lg-5">
        <div class="card border-0 shadow-lg rounded-4">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <div class="bg-warning bg-opacity-10 text-warning rounded-circle d-inline-flex align-items-center justify-content-center mb-3"
                        style="width: 70px; height: 70px;">
                        <i class="bi bi-shield-lock-fill fs-1"></i>
                    </div>
                    <h3 class="fw-bold">Troca de Senha Obrigatória</h3>
                    <p class="text-muted">Por segurança, defina uma nova senha para sua conta.</p>
                </div>

                <form method="post">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />

                    <div class="mb-3">
                        <label class="form-label fw-bold">Nova Senha</label>
                        <input type="password" name="password" class="form-control form-control-lg bg-light border-0"
                            required minlength="6" autofocus>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">Confirmar Nova Senha</label>
                        <input type="password" name="confirm_password"
                            class="form-control form-control-lg bg-light border-0" required minlength="6">
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg rounded-pill fw-bold">
                            Salvar Nova Senha
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

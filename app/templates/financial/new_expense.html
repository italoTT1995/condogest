{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-header bg-white border-0 pt-4 px-4">
                <h4 class="fw-bold mb-0">Registrar Despesa</h4>
                <p class="text-muted small">Adicione um novo gasto para o portal da transparência.</p>
            </div>
            <div class="card-body p-4">
                <form method="post" enctype="multipart/form-data">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />

                    <div class="mb-3">
                        <label class="form-label fw-bold small text-muted">Descrição</label>
                        <input type="text" name="description" class="form-control form-control-lg bg-light border-0"
                            required placeholder="Ex: Conserto do Portão">
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold small text-muted">Categoria</label>
                            <select name="category" class="form-select form-select-lg bg-light border-0" required>
                                <option value="Manutenção">Manutenção</option>
                                <option value="Pessoal">Pessoal / Salários</option>
                                <option value="Contas">Contas (Água/Luz)</option>
                                <option value="Administrativo">Administrativo</option>
                                <option value="Outros">Outros</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold small text-muted">Valor (R$)</label>
                            <input type="number" step="0.01" name="amount"
                                class="form-control form-control-lg bg-light border-0" required>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold small text-muted">Data da Despesa</label>
                            <input type="date" name="date_incurred"
                                class="form-control form-control-lg bg-light border-0" required value="{{ today }}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold small text-muted">Comprovante (Foto/PDF)</label>
                            <input type="file" name="proof" class="form-control form-control-lg bg-light border-0">
                        </div>
                    </div>

                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-primary rounded-pill fw-bold py-2">Registrar
                            Despesa</button>
                        <a href="{{ url_for('financial.transparency') }}"
                            class="btn btn-link text-muted mt-2">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

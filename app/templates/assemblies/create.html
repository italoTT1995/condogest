{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-header bg-white border-0 pt-4 px-4">
                <h4 class="fw-bold mb-0">Nova Assembleia</h4>
            </div>
            <div class="card-body p-4">
                <form method="post">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />

                    <div class="mb-3">
                        <label class="form-label fw-bold">Título</label>
                        <input type="text" class="form-control" name="title" required
                            placeholder="Ex: Assembleia Geral Extraordinária">
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Descrição</label>
                        <textarea class="form-control" name="description" rows="3"
                            placeholder="Resumo dos assuntos..."></textarea>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">Data e Hora de Início</label>
                        <input type="datetime-local" class="form-control" name="start_time" required>
                    </div>

                    <div class="d-flex justify-content-end gap-2">
                        <a href="{{ url_for('assemblies.index') }}" class="btn btn-light rounded-pill">Cancelar</a>
                        <button type="submit" class="btn btn-primary rounded-pill px-4 fw-bold">Criar Sala</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
